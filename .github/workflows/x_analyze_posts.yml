name: X Analyze Posts (yorusyoku)

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * *"

concurrency:
  group: x-analyze-posts-yorusyoku
  cancel-in-progress: false

jobs:
  analyze-posts:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Analyze raw posts into scored tabs
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
        run: |
          python x_analyze_posts.py

      - name: Discord notify on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -s -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"embeds\":[{\"title\":\"X analysis failed\",\"description\":\"yorusyoku analysis workflow failed.\",\"color\":16711680}]}"
          fi
