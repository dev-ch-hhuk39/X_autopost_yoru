name: X Generate Review Rewrites (Gemini)

on:
  workflow_dispatch:
  schedule:
    - cron: "45 0 * * *" # JST 09:45

concurrency:
  group: x-generate-review-rewrites
  cancel-in-progress: false

jobs:
  rewrite:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Generate Gemini rewrites for top pending rows
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_REWRITE_MODEL: gemini-2.5-flash
          GEMINI_REWRITE_MAX_ROWS: "8"
          GEMINI_REWRITE_INTERVAL_SECONDS: "7"
        run: |
          python x_generate_review_rewrites.py

      - name: Discord notify on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -s -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"embeds\":[{\"title\":\"Gemini rewrite failed\",\"description\":\"yorusyoku AI rewrite workflow failed.\",\"color\":16711680}]}"
          fi
