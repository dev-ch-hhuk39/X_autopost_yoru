name: X Legacy Tab Auto Post (x_autopost_yoru at 13/16/20/24 JST)

on:
  schedule:
    - cron: "45 3 * * *"   # JST 12:45
    - cron: "45 6 * * *"   # JST 15:45
    - cron: "45 10 * * *"  # JST 19:45
    - cron: "45 14 * * *"  # JST 23:45
  workflow_dispatch:

concurrency:
  group: x-legacy-tab-auto-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TZ: Asia/Tokyo
      SHEET_ID: ${{ secrets.SHEET_ID }}
      GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
      SHEET_TAB: x_autopost_yoru
      X_API_KEY: ${{ secrets.X_API_KEY }}
      X_API_SECRET: ${{ secrets.X_API_SECRET }}
      X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait random 0-30 minutes for natural timing
        if: github.event_name == 'schedule'
        run: |
          python - <<'PY'
          import random
          import time
          seconds = random.randint(0, 30 * 60)
          print(f"[INFO] Sleeping for {seconds} seconds before posting.")
          time.sleep(seconds)
          PY

      - name: Post 1 item from legacy sheet tab
        run: |
          python x_legacy_tab_autopost.py

      - name: Discord notify on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -s -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"embeds\":[{\"title\":\"旧Xタブ投稿失敗\",\"description\":\"x_autopost_yoru タブの自動投稿でエラーが発生しました。\",\"color\":16711680}]}"
          fi
