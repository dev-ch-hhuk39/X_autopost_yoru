name: コンテンツ収集・生成（夜職 X）

on:
  workflow_dispatch:
  schedule:
    - cron: '0 13 * * *'  # JST 22:00 毎日チェック

concurrency:
  group: collect-yoru-x
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Mask secrets
        run: |
          echo "::add-mask::${{ secrets.GCP_SA_JSON }}"
          echo "::add-mask::${{ secrets.GEMINI_API_KEY }}"
          echo "::add-mask::${{ secrets.DISCORD_WEBHOOK_URL }}"

      - name: Gemini生成 → スプシ書き込み
        env:
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          SHEET_ID:             ${{ secrets.SHEET_ID }}
          SHEET_TAB:            x_autopost_yoru
          DEDUP_TAB:            ${{ secrets.DEDUP_TAB }}
          GCP_SA_JSON:          ${{ secrets.GCP_SA_JSON }}
          DISCORD_WEBHOOK_URL:  ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python collect.py --platform x

      - name: Discord通知（失敗時）
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -s -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"embeds\":[{\"title\":\"\\u274c 収集ワークフロー失敗\",\"description\":\"夜職X: collect.yml でエラーが発生しました\",\"color\":16711680}]}"
          fi

      - name: Keepalive
        if: always()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          date > last_collect.txt
          git add last_collect.txt
          git commit -m "keepalive: collect $(date -u +%Y-%m-%dT%H:%M:%SZ)" || exit 0
          git push
