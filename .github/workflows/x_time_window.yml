name: X Auto Post (queue from Sheet at 00:00 & 02:00 JST)

on:
  schedule:
    - cron: "0 15 * * *"  # JST 00:00（UTC 15:00）
    - cron: "0 17 * * *"  # JST 02:00（UTC 17:00）
  workflow_dispatch:
    inputs:
      force_run:
        description: "手動テストで即実行（yes で実行）"
        required: false
        default: "yes"

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: Asia/Tokyo

      # --- Google Sheets ---
      SHEET_ID: ${{ secrets.SHEET_ID }}
      GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
      SHEET_TAB: x_autopost_yoru

      # --- X API keys ---
      X_API_KEY: ${{ secrets.X_API_KEY }}
      X_API_SECRET: ${{ secrets.X_API_SECRET }}
      X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}

      # --- キュー方式: 1件だけ投稿 ---
      FORCE_ONE: "1"
      DRY_RUN: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Mask secrets
        run: |
          echo "::add-mask::${{ secrets.GCP_SA_JSON }}"
          echo "::add-mask::${{ secrets.X_API_KEY }}"
          echo "::add-mask::${{ secrets.X_API_SECRET }}"
          echo "::add-mask::${{ secrets.X_ACCESS_TOKEN }}"
          echo "::add-mask::${{ secrets.X_ACCESS_TOKEN_SECRET }}"
          echo "::add-mask::${{ secrets.DISCORD_WEBHOOK_URL }}"
      - name: Run poster (queue 1 item)
        run: |
          python auto_post.py
      - name: Discord通知（失敗時）
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -s -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"embeds\":[{\"title\":\"\\u274c 投稿失敗\",\"description\":\"夜職X: 投稿エラーが発生しました\",\"color\":16711680}]}"
          fi
      - name: Keepalive Workflow
        if: always()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          date > last_run.txt
          git add last_run.txt
          git commit -m "keepalive: $(date -u +%Y-%m-%dT%H:%M:%SZ)" || exit 0
          git push
