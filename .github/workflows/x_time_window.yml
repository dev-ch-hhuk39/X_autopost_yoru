name: X Auto Post (queue from Sheet at 14:00 & 18:00 JST)

on:
  schedule:
    - cron: "45 4 * * *"   # JST 13:45
    - cron: "45 8 * * *"   # JST 17:45
  workflow_dispatch:
    inputs:
      force_run:
        description: "手動テストで即実行（yes で実行）"
        required: false
        default: "yes"

concurrency:
  group: x-auto-post-yorusyoku
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TZ: Asia/Tokyo
      SHEET_ID: ${{ secrets.SHEET_ID }}
      GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
      SHEET_TAB: 03_投稿キュー
      X_API_KEY: ${{ secrets.X_API_KEY }}
      X_API_SECRET: ${{ secrets.X_API_SECRET }}
      X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync queue before posting
        run: |
          python x_sync_post_queue.py

      - name: Wait random 0-30 minutes for natural timing
        if: github.event_name == 'schedule'
        run: |
          python - <<'PY'
          import random
          import time
          seconds = random.randint(0, 30 * 60)
          print(f"[INFO] Sleeping for {seconds} seconds before posting.")
          time.sleep(seconds)
          PY

      - name: Post 1 item from queue
        run: |
          python auto_post.py

      - name: Discord notify on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -s -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"embeds\":[{\"title\":\"X投稿失敗\",\"description\":\"夜職Xの自動投稿でエラーが発生しました。\",\"color\":16711680}]}"
          fi
